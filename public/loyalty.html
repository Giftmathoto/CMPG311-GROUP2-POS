<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS System — Loyalty</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">POS System <span>/</span> Loyalty</div>
  
<nav>
    <a href="index.html">Dashboard</a>
    <a href="register.html">Register</a>
    <a href="products.html">Products</a>
    <a href="sales.html">Sales</a>
    <a href="employees.html">Employees</a>
    <a href="customers.html">Customers</a>
    <a href="loyalty.html">Loyalty</a>
    <a href="inventory.html">Inventory</a>
    <a href="feedback.html">Reports</a>
    <a href="login.html">Login</a>
  </nav>

  <div class="header-meta">
    <span class="dot" id="conn-dot"></span>
    <span>api: online/local</span>
  </div>
</header>

<main class="main-single">
  <div class="panel">
    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">Total Records</div>
        <div class="stat-val" id="s-total">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">API Status</div>
        <div class="stat-val" id="s-status">LIVE</div>
      </div>
      <div class="stat">
        <div class="stat-label">Endpoint</div>
        <div class="stat-val" style="font-size:14px">/api/loyalty</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Search loyalty…" oninput="filterTable()">
    </div>

    <table>
      <thead>
  <tr>
    <th>ID</th>
    <th>Customer</th>
    <th>Loyalty ID</th>
    <th>Points</th>
    <th>Tier</th>
    <th>Email</th>
    <th>Phone</th>
  </tr>
</thead>
      <tbody id="loyalty-body">
        <tr><td colspan="4" class="empty-state">Loading records…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
const API = '/api/loyalty';
let loyalty = [];

async function loadLoyalty() {
  const tbody = document.getElementById('loyalty-body');

  try {
    const res = await fetch(API);

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Failed to load loyalty');
    }

    loyalty = data;

    document.getElementById('s-total').textContent = loyalty.length;
    document.getElementById('s-status').textContent = 'ONLINE';

    tbody.innerHTML = loyalty.map(c => `
      <tr>
        <td>#${c.id}</td>
        <td>${c.name || '—'}</td>
        <td>${c.loyalty_id || '—'}</td>
        <td>${Number(c.loyalty_points || 0)}</td>
        <td>${c.loyalty_tier || 'No Tier'}</td>
        <td>${c.email || '—'}</td>
        <td>${c.phone || '—'}</td>
      </tr>
    `).join('');

  } catch (err) {
    console.error('LOYALTY PAGE ERROR:', err);

    document.getElementById('s-status').textContent = 'OFFLINE';

    tbody.innerHTML = `
      <tr>
        <td colspan="7" style="text-align:center;color:red;padding:2rem">
          Could not connect to API: ${err.message}
        </td>
      </tr>
    `;
  }
}

window.addEventListener('DOMContentLoaded', loadLoyalty);

</script>

</body>
</html>
