<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS System — Loyalty</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">POS System <span>/</span> Loyalty</div>
  
<nav>
    <a href="index.html">Dashboard</a>
    <a href="register.html">Register</a>
    <a href="products.html">Products</a>
    <a href="sales.html">Sales</a>
    <a href="employees.html">Employees</a>
    <a href="customers.html">Customers</a>
    <a href="loyalty.html">Loyalty</a>
    <a href="inventory.html">Inventory</a>
    <a href="reports.html">Reports</a>
    <a href="login.html">Login</a>
  </nav>

  <div class="header-meta">
    <span class="dot" id="conn-dot"></span>
    <span>api: online/local</span>
  </div>
</header>

<main class="main-single">
  <div class="panel">
    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">Total Records</div>
        <div class="stat-val" id="s-total">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">API Status</div>
        <div class="stat-val" id="s-status">LIVE</div>
      </div>
      <div class="stat">
        <div class="stat-label">Endpoint</div>
        <div class="stat-val" style="font-size:14px">/api/loyalty</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Search loyalty…" oninput="filterTable()">
    </div>

    <table>
      <thead>
  <tr>
    <th>ID</th>
    <th>Customer</th>
    <th>Loyalty ID</th>
    <th>Points</th>
    <th>Tier</th>
    <th>Email</th>
    <th>Phone</th>
  </tr>
</thead>
      <tbody id="table-body">
        <tr><td colspan="4" class="empty-state">Loading records…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
const API = '/api/loyalty';
let allData = [];

function value(item, keys) {
  for (const key of keys) {
    if (item[key] !== undefined && item[key] !== null) return item[key];
  }
  return '—';
}

function renderTable(data) {
  const tbody = document.getElementById('table-body');

  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No records found</td></tr>';
    return;
  }
   
  tbody.innerHTML = loyalty.map(c => `
  <tr>
    <td>#${c.id}</td>
    <td>${c.name || '—'}</td>
    <td>${c.loyalty_id || '—'}</td>
    <td>${Number(c.loyalty_points || 0)}</td>
    <td>${c.loyalty_tier || 'No Tier'}</td>
    <td>${c.email || '—'}</td>
    <td>${c.phone || '—'}</td>
  </tr>
`).join('');
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allData.filter(x => JSON.stringify(x).toLowerCase().includes(q));
  renderTable(filtered);
}

async function loadData() {
  try {
    const response = await fetch(API);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    allData = await response.json();

    document.getElementById('s-total').textContent = allData.length;
    document.getElementById('s-status').textContent = 'LIVE';
    document.getElementById('conn-dot').style.background = 'var(--green)';

    renderTable(allData);
  } catch (error) {
    document.getElementById('s-status').textContent = 'OFFLINE';
    document.getElementById('conn-dot').style.background = 'var(--red)';
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="4" class="empty-state" style="color:var(--red)">Could not connect to API</td></tr>';
  }
}

loadData();

</script>

</body>
</html>
