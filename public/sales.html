<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS System — Sales</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">POS System <span>/</span> Sales</div>
  
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="sales.html">Sales</a>
    <a href="employees.html">Employees</a>
    <a href="customers.html">Customers</a>
    <a href="loyalty.html">Loyalty</a>
  </nav>

  <div class="header-meta">
    <span class="dot" id="conn-dot"></span>
    <span id="conn-label">api: localhost:3000</span>
  </div>
</header>

<main>
  <div style="display:flex;flex-direction:column;gap:1.5rem">
    <div class="panel">
      <div class="stats-row">
        <div class="stat">
          <div class="stat-label">Total Sales</div>
          <div class="stat-val" id="s-total">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total Revenue</div>
          <div class="stat-val" id="s-revenue">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Avg Sale</div>
          <div class="stat-val" id="s-avg">—</div>
        </div>
      </div>

      <div class="search-bar">
        <input type="text" id="search" placeholder="Search sales…" oninput="filterTable()">
      </div>

      <table>
        <thead>
          <tr>
            <th style="width:60px">ID</th>
            <th>Customer</th>
            <th>Employee</th>
            <th>Amount (R)</th>
            <th style="width:150px">Actions</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="5" class="empty-state">Loading sales…</td></tr>
        </tbody>
      </table>

      <div class="status-bar">
        <span id="row-count">0 sales</span>
        <span id="last-refresh">—</span>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">
          Sale Form
          <span class="form-mode-tag tag-add" id="form-tag">ADD</span>
        </span>
        <button class="btn" onclick="loadSales()" style="font-size:11px;padding:4px 10px">↻ Refresh</button>
      </div>
      <div class="form-section">
        <div class="field">
          <label>Customer ID</label>
          <input type="number" id="f-customer-id" placeholder="Customer ID" min="1">
        </div>
        <div class="field">
          <label>Employee ID</label>
          <input type="number" id="f-employee-id" placeholder="Employee ID" min="1">
        </div>
        <div class="field">
          <label>Total Amount (R)</label>
          <input type="number" id="f-total-amount" placeholder="0.00" step="0.01" min="0">
        </div>
        <button class="btn-primary" onclick="submitForm()" id="submit-btn">Record Sale</button>
        <button class="btn-secondary" onclick="resetForm()" id="cancel-btn" style="display:none">Cancel Edit</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Activity Log</span>
      </div>
      <div class="log-section" id="log-section">
        <div class="log-entry">
          <span class="log-time">--:--</span>
          <span>Waiting for actions…</span>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const API = 'http://localhost:3000/api/sales';
  let allSales = [];
  let editingId = null;

  function ts() {
    return new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function log(msg, type = '') {
    const s = document.getElementById('log-section');
    const e = document.createElement('div');
    e.className = 'log-entry';
    e.innerHTML = `<span class="log-time">${ts()}</span><span class="${type ? 'log-' + type : ''}">${msg}</span>`;
    s.prepend(e);
    const entries = s.querySelectorAll('.log-entry');
    if (entries.length > 10) entries[entries.length - 1].remove();
  }

  function updateStats(sales) {
    document.getElementById('s-total').textContent = sales.length;
    const totalRevenue = sales.reduce((a, s) => a + parseFloat(s.total_amount), 0);
    document.getElementById('s-revenue').textContent = 'R' + totalRevenue.toFixed(2);
    const avg = sales.length ? totalRevenue / sales.length : 0;
    document.getElementById('s-avg').textContent = 'R' + avg.toFixed(2);
  }

  function renderTable(sales) {
    const tbody = document.getElementById('table-body');
    if (!sales.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No sales found</td></tr>';
      document.getElementById('row-count').textContent = '0 sales';
      return;
    }
    tbody.innerHTML = sales.map(s => `
      <tr>
        <td class="id-cell">#${s.id}</td>
        <td>${s.customer_name || '—'}</td>
        <td>${s.employee_name || '—'}</td>
        <td class="price-cell">R${parseFloat(s.total_amount).toFixed(2)}</td>
        <td>
          <div class="action-btns">
            <button class="btn btn-edit" onclick="startEdit(${s.id})">Edit</button>
            <button class="btn btn-danger" onclick="deleteSale(${s.id})">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
    document.getElementById('row-count').textContent = `${sales.length} sale${sales.length !== 1 ? 's' : ''}`;
    document.getElementById('last-refresh').textContent = 'updated ' + ts();
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allSales.filter(s => JSON.stringify(s).toLowerCase().includes(q));
    renderTable(filtered);
  }

  async function loadSales() {
    try {
      const r = await fetch(API);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      allSales = await r.json();
      updateStats(allSales);
      filterTable();
      log('Sales loaded (' + allSales.length + ')', 'ok');
      document.getElementById('conn-dot').style.background = 'var(--green)';
    } catch (e) {
      log('GET failed: ' + e.message, 'err');
      document.getElementById('conn-dot').style.background = 'var(--red)';
      document.getElementById('table-body').innerHTML =
        '<tr><td colspan="5" class="empty-state" style="color:var(--red)">Could not connect to API</td></tr>';
    }
  }

  function startEdit(id) {
    const s = allSales.find(x => x.id === id);
    if (!s) return;
    editingId = id;
    document.getElementById('f-customer-id').value = s.customer_id || '';
    document.getElementById('f-employee-id').value = s.employee_id || '';
    document.getElementById('f-total-amount').value = parseFloat(s.total_amount).toFixed(2);
    document.getElementById('submit-btn').textContent = 'Update Sale';
    document.getElementById('cancel-btn').style.display = 'block';
    document.getElementById('form-tag').textContent = 'EDIT';
    document.getElementById('form-tag').className = 'form-mode-tag tag-edit';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetForm() {
    editingId = null;
    document.getElementById('f-customer-id').value = '';
    document.getElementById('f-employee-id').value = '';
    document.getElementById('f-total-amount').value = '';
    document.getElementById('submit-btn').textContent = 'Record Sale';
    document.getElementById('cancel-btn').style.display = 'none';
    document.getElementById('form-tag').textContent = 'ADD';
    document.getElementById('form-tag').className = 'form-mode-tag tag-add';
  }

  async function submitForm() {
    const customer_id = parseInt(document.getElementById('f-customer-id').value);
    const employee_id = parseInt(document.getElementById('f-employee-id').value);
    const total_amount = parseFloat(document.getElementById('f-total-amount').value);

    if (isNaN(customer_id) || isNaN(employee_id) || isNaN(total_amount)) {
      log('Please fill in all fields', 'err');
      return;
    }

    const body = JSON.stringify({ customer_id, employee_id, total_amount });
    try {
      let r;
      if (editingId) {
        r = await fetch(API + '/' + editingId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        log('Updated sale: R' + total_amount.toFixed(2), 'ok');
      } else {
        r = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        log('Recorded sale: R' + total_amount.toFixed(2), 'ok');
      }
      resetForm();
      loadSales();
    } catch (e) {
      log((editingId ? 'PUT' : 'POST') + ' failed: ' + e.message, 'err');
    }
  }

  async function deleteSale(id) {
    const s = allSales.find(x => x.id === id);
    if (!s) return;
    if (!confirm('Delete this sale (R' + s.total_amount + ')? This cannot be undone.')) return;
    try {
      const r = await fetch(API + '/' + id, { method: 'DELETE' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      log('Deleted sale: R' + s.total_amount, 'ok');
      loadSales();
    } catch (e) {
      log('DELETE failed: ' + e.message, 'err');
    }
  }

  loadSales();
</script>
</body>
</html>
