<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS System — Employees</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">POS System <span>/</span> Employees</div>
  
<nav>
    <a href="index.html">Dashboard</a>
    <a href="register.html">Register</a>
    <a href="products.html">Products</a>
    <a href="sales.html">Sales</a>
    <a href="employees.html">Employees</a>
    <a href="customers.html">Customers</a>
    <a href="loyalty.html">Loyalty</a>
    <a href="inventory.html">Inventory</a>
    <a href="reports.html">Reports</a>
    <a href="login.html">Login</a>
  </nav>

  <div class="header-meta">
    <span class="dot" id="conn-dot"></span>
    <span>api: localhost:3000</span>
  </div>
</header>

<main class="main-single">
  <div class="panel">
    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">Total Records</div>
        <div class="stat-val" id="s-total">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">API Status</div>
        <div class="stat-val" id="s-status">LIVE</div>
      </div>
      <div class="stat">
        <div class="stat-label">Endpoint</div>
        <div class="stat-val" style="font-size:14px">/api/employees</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Search employees…" oninput="filterTable()">
    </div>

    <div style="margin-top: 20px; margin-bottom: 20px; padding: 15px; background: #fff; border-radius: 8px; border: 1px solid #eee;">
      <h3 style="margin-top: 0; font-family: 'DM Mono', monospace; font-size: 14px;">+ HIRE NEW STAFF</h3>
      <form id="add-employee-form" style="display: flex; gap: 10px; align-items: center;">
        
        <input type="text" id="emp-name" placeholder="Full Name (e.g. Jane Doe)" required style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1;">
        
        <select id="emp-role" required style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1;">
          <option value="" disabled selected>Select Role...</option>
          <option value="Cashier">Cashier</option>
          <option value="Senior Cashier">Senior Cashier</option>
          <option value="Store Manager">Store Manager</option>
        </select>

        <button type="submit" style="padding: 8px 16px; background: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Add Employee</button>
      </form>
    </div>

    <table>
      <thead>
        <tr><th>ID</th><th>Name</th><th>Role</th><th>Status</th></tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="4" class="empty-state">Loading records…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
const API = 'http://localhost:3000/api/employees';
let allData = [];

function value(item, keys) {
  for (const key of keys) {
    if (item[key] !== undefined && item[key] !== null) return item[key];
  }
  return '—';
}

function renderTable(data) {
  const tbody = document.getElementById('table-body');

  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No records found</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(item => `
    <tr>
      <td class="id-cell">#${value(item, ['id', 'employees_id', 'transaction_id'])}</td>
      <td>${value(item, ['name', 'customer', 'customer_name', 'employee_name'])}</td>
      <td>${value(item, ['total', 'price', 'email', 'role', 'points', 'loyalty_points'])}</td>
      <td>${value(item, ['payment_method', 'status', 'stock'])}</td>
    </tr>
  `).join('');
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allData.filter(x => JSON.stringify(x).toLowerCase().includes(q));
  renderTable(filtered);
}

async function loadData() {
  try {
    const response = await fetch(API);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    allData = await response.json();

    document.getElementById('s-total').textContent = allData.length;
    document.getElementById('s-status').textContent = 'LIVE';
    document.getElementById('conn-dot').style.background = 'var(--green)';

    renderTable(allData);
  } catch (error) {
    document.getElementById('s-status').textContent = 'OFFLINE';
    document.getElementById('conn-dot').style.background = 'var(--red)';
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="4" class="empty-state" style="color:var(--red)">Could not connect to API</td></tr>';
  }
}

loadData();
// Listen for the form submission
document.getElementById('add-employee-form').addEventListener('submit', async function(event) {
    event.preventDefault(); // Stop the page from refreshing

    const newName = document.getElementById('emp-name').value;
    const newRole = document.getElementById('emp-role').value;

    try {
        const response = await fetch(API, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ 
                name: newName, 
                role: newRole,
                status: 'Active' // Default to Active when hiring!
            })
        });

        if (response.ok) {
            // Clear the form
            document.getElementById('add-employee-form').reset();
            
            // Reload the table to show the new hire instantly
            loadData(); 
        } else {
            console.error("Server refused to add employee.");
            alert("Failed to add employee.");
        }
    } catch (error) {
        console.error("Failed to connect to the API:", error);
    }
});
</script>

</body>
</html>
